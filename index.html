<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Voice Translator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>AI Voice Translator</h1>

  <div class="container">
    <!-- LEFT SIDE -->
    <div class="box">
      <h2>Input</h2>

      <select id="sourceLang">
        <option value="ar">Arabic</option>
        <option value="bn">Bengali</option>
        <option value="zh">Chinese</option>
        <option value="nl">Dutch</option>
        <option value="en" selected>English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="el">Greek</option>
        <option value="hi">Hindi</option>
        <option value="it">Italian</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="mr">Marathi</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="es">Spanish</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="tr">Turkish</option>
        <option value="ur">Urdu</option>
      </select>

      <textarea id="inputText" placeholder="Type text here..."></textarea>

      <div class="btn-group">
        <button id="inputSpeakBtn">🔊 Speak Input</button>
        <button id="translateBtn">🌐 Translate</button>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="box">
      <h2>Output</h2>

      <select id="targetLang">
        <option value="ar">Arabic</option>
        <option value="bn">Bengali</option>
        <option value="zh">Chinese</option>
        <option value="nl">Dutch</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="el">Greek</option>
        <option value="hi" selected>Hindi</option>
        <option value="it">Italian</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="mr">Marathi</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="es">Spanish</option>
        <option value="ta">Tamil</option>
        <option value="te">Telugu</option>
        <option value="tr">Turkish</option>
        <option value="ur">Urdu</option>
      </select>

      <textarea id="outputText" placeholder="Translated text..." readonly></textarea>

      <div class="btn-group">
        <button id="outputSpeakBtn">🔊 Speak Output</button>
        <button id="copyBtn">📋 Copy</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
